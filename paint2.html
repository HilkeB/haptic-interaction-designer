<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekenapp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        .container {
            display: grid;
            grid-template-columns: 0.7fr 1.3fr;
            grid-template-rows: 0.5fr 3fr 0.5fr 1.5fr 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "header header"
                "controls canvas"
                ". title"
                "keyboard keyboard"
                "video video";
        }

        .canvas {
            grid-area: canvas;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "colors colors colors colors"
                "shapes shapes shapes shapes"
                "sizes sizes sizes sizes";
            grid-area: controls;
        }

        .colors {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "colorstitle colorstitle colorstitle colorstitle"
                ". . . .";
            grid-area: colors;
        }

        .colorstitle {
            grid-area: colorstitle;
        }

        .shapes {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "shapestitle shapestitle shapestitle shapestitle"
                ". . . .";
            grid-area: shapes;
        }

        .shapestitle {
            grid-area: shapestitle;
        }

        .sizes {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "sizestitle"
                ".";
            grid-area: sizes;
        }

        .sizestitle {
            grid-area: sizestitle;
        }

        .title {
            grid-area: title;
        }

        .keyboard {
            display: grid;
            grid-template-columns: 1.7fr 0.3fr;
            grid-template-rows: 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "keys specialkeys";
            grid-area: keyboard;
        }

        .keys {
            grid-area: keys;
        }

        .specialkeys {
            grid-area: specialkeys;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: stretch;
            padding: 5px;
        }

        .video {
            grid-area: video;
        }

        .header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 10px;
            grid-auto-flow: row;
            grid-template-areas:
                "back logo clear save";
            grid-area: header;
            padding: 10px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            grid-area: header;
        }

        .back {
            grid-area: back;
            margin-right: auto;
        }

        .logo {
            grid-area: logo;
            display: flex;
            justify-content: center;
            flex-grow: 1;
        }

        .clear {
            grid-area: clear;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-left: auto;
        }

        .save {
            grid-area: save;
            margin-left: 10px;
        }


        html,
        body,
        .container {
            height: 120%;
            margin: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #E6F0FA;
            margin: 0;
            padding: 20px;
        }

        #canvas-container {
            background-color: #DAE8FC;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #title-display {
            font-size: 18px;
            color: #333;
            margin-top: 10px;
        }

        .shapestitle,
        .colorstitle,
        .sizestitle {
            font-size: 18px;
            color: #555;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .colorbutton,
        .shapebutton {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button#red {
            background-color: red;
        }

        button#blue {
            background-color: blue;
        }

        button#yellow {
            background-color: yellow;
        }

        button#erase {
            background-color: darkblue;
        }

        button {
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button:active {
            background-color: #ddd;
        }

        #specialbutton {
            width: 60px;
            height: 120px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .sizes {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "sizestitle"
                ".";
            grid-area: sizes;
            padding: 10px;
        }

        #sizeselect {
            width: 25vw;
            margin: 0 auto;
            display: block;
        }

        button#stop-button {
            width: 150px;
            height: 50px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
        }

        button#stop-button:hover {
            background-color: #dd0000;
        }

        button#back-button,
        button#clear-button,
        button#save-button {
            width: 100px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }

        button#back-button:hover,
        button#clear-button:hover,
        button#save-button:hover {
            background-color: #45a049;
        }

        ::-webkit-scrollbar-track {
            box-shadow: inset 0 0 5px grey;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: grey;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b30000;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <div class="back">
                <button id="back-button" onclick="backButton()">TERUG</button>
            </div>
            <div class="logo" id="logo">
                <button id="stop-button" onclick="stopButton()">STOP</button>
            </div>
            <div class="clear">
                <button id="clear-button" onclick="clearButton()">CANVAS LEEG</button>
            </div>
            <div class="save">
                <button id="save-button" onclick="saveButton()">OPSLAAN</button>
            </div>
        </div>

        <div class="canvas" id="canvas-container"></div>

        <div class="title" id="title-display">Naam kunstwerk: </div>

        <div class="controls">
            <div class="colors">
                <div class="colorstitle">Kleur</div>
                <button class="colorbutton" id="red" onclick="changeColor('#FF0000')"></button>
                <button class="colorbutton" id="blue" onclick="changeColor('#0000FF')"></button>
                <button class="colorbutton" id="yellow" onclick="changeColor('#FFFF00')"></button>
                <button class="colorbutton" id="erase" onclick="changeColor('#DCEBFA')">🧽</button>
            </div>
            <div class="shapes">
                <div class="shapestitle">Vorm</div>
                <button class="shapebutton" id="line" onclick="changeShape('none')">➖</button>
                <button class="shapebutton" id="square" onclick="changeShape('rectangles')">◼</button>
                <button class="shapebutton" id="hexagon" onclick="changeShape('dotted')">⬢</button>
                <button class="shapebutton" id="circle" onclick="changeShape('circles')">⭕</button>
            </div>
            <div class="sizes">
                <div class="sizestitle">Dikte</div>
                <select name="sizes" class="thickness" id="sizeselect" onchange="changeThickness()">
                    <option value="1">Dun (1px)</option>
                    <option value="5" selected>Medium (5px)</option>
                    <option value="10">Dik (10px)</option>
                    <option value="15">Zeer dik (15px)</option>
                </select>
            </div>
        </div>

        <div class="keyboard">
            <div class="keys" id="keys"></div>
            <div class="specialkeys">
                <button id="specialbutton delete" onclick="handleKeyPress('EMPTY')"><br>TITEL LEEG<br><br></button>
                <button id="specialbutton backspace"
                    onclick="handleKeyPress('BACKSPACE')"><br>BACKSPACE<br><br></button>
                <button id="specialbutton space" onclick="handleKeyPress('SPATIE')"><br>SPATIE<br><br></button>
            </div>
        </div>

    </div>

    <script src="paint.html"></script>
    <script src="scripts/serialencoder.js"></script>
</body>

</html>
