<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haptic interaction designer encoder</title>
</head>

<body>

    <script>
        let path = null; // global variable for logging temporary effect/delay paths

        async function preload() {

            fetch('./defaultNodes.json')
                .then((response) => response.json())
                .then((json) => {
                    data = json.drawflow.Home.data;
                    // console.log(json.drawflow.Home.data);

                    let sequences = [];
                    for (n in data) { // loop through all nodes
                        let node = data[n];
                        // console.log("Node":, node);

                        if (node.name == "ui") { // detect dom element
                            // console.log("UI element:", node);
                            let events = node.outputs.output_1.connections;

                            events.forEach(event => { // loop through all events attached to dom element
                                // console.log("Event:", data[event.node]);
                                let actuators = data[event.node].outputs.output_1.connections;

                                let actuatorData = [];
                                actuators.forEach(actuator => { // loop through all actuators attached to event
                                    // console.log("Actuator:", data[actuator.node]);

                                    path = []; // clear path before each depth-first search, then perform search
                                    checkConnection(data[actuator.node]);
                                    actuatorData.push(path);
                                });

                                // console.log("EVENT:", node.data.element, data[event.node].data.domevent, actuatorData);

                                // Generate bytecode sequence by building start bits, device config bits, effect / delay bits and end bits
                                let domId = node.data.element;
                                let eventType = data[event.node].data.domevent;
                                let sequence = [];
                                actuatorData.forEach(actuator => {  // loop through all actuators that need to be triggered
                                    actuator.forEach((a, index) => {  // loop through each path (consisting of actuatorinfo + up to 8 effects/delays)
                                        if (index == 0) { // first item in actuatorData is actuatorInfo
                                            sequence.push(124); // begin sequence bit
                                            let playbackType = 'oneshot';
                                            let actuatorType = a.data.actuatortype;
                                            let deviceIdConfig = ((playbackType == 'oneshot' ? 0 : 1) << 5) | ((actuatorType == "erm" ? 0 : 1)) << 4 | (a.data.actuatornr - 1);
                                            sequence.push(deviceIdConfig);  // add device config
                                        } else {
                                            if (a.name == "effect") {
                                                let effectNr = a.data.effectintensity;
                                                sequence.push(effectNr & 0x7F);  // add effect
                                            } else if (a.name == "delay") {
                                                let delayValue = a.data.delay / 10;
                                                sequence.push(0x80 | (delayValue - 1));  // add delay
                                            } else {
                                                console.error("Unknown actuator function:", a.name)
                                            }
                                        }
                                    });
                                    sequence.push(0x00); // sequence stop (to block sequencer from overflowing in previous effects)
                                });
                                sequence.push(125); // add final GO bit

                                // console.log("Current config:", {
                                //     "domId": domId,
                                //     "eventType": eventType,
                                //     "sequence": sequence
                                // });

                                sequences.push({
                                    "domId": domId,
                                    "eventType": eventType,
                                    "sequence": sequence
                                });
                            });
                        }
                    }

                    console.log("Config:", sequences);
                });

        }

        function checkConnection(node) {  // depth-first search on all attached interactions
            path.push(node);  // add current node to the current path

            if (node.outputs.output_1.connections.length == 1) {
                // console.log("Node has connection:", data[node.outputs.output_1.connections[0].node]);
                checkConnection(data[node.outputs.output_1.connections[0].node]);
            } else {
                // console.log("Node has no (more) connection.");
            }
        }

        let data = null;
        preload();
    </script>

</body>

</html>
