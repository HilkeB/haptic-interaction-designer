<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Haptic interaction designer</title>
  <meta name="description" content="">

  <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
  <link rel="stylesheet" type="text/css" href="styles/drawflowBeautiful.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js"
    integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <h2>Haptic interaction node editor</h2>
    <div class="github-link"><a href="https://github.com/HilkeB/haptic-interaction-designer" target="_blank"><i
          class="fab fa-github fa-3x"></i></a></div>
    <div class="back-button"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
  </header>

  <div class="wrapper">
    <div class="col">
      <div class="drag-drawflow" draggable="true" ondragstart="drag(event)" data-node="ui">
        <i class="fa-regular fa-window-maximize"></i><span> UI element</span>
      </div>
      <div class="drag-drawflow" draggable="true" ondragstart="drag(event)" data-node="event">
        <i class="fa-solid fa-computer-mouse"></i><span> Interaction event</span>
      </div>
      <div class="drag-drawflow" draggable="true" ondragstart="drag(event)" data-node="actuator">
        <i class="fa-solid fa-mobile-vibrate"></i><span> Actuator</span>
      </div>
      <div class="drag-drawflow" draggable="true" ondragstart="drag(event)" data-node="effect">
        <i class="fa-solid fa-wave-square"></i><span> Effect</span>
      </div>
      <div class="drag-drawflow" draggable="true" ondragstart="drag(event)" data-node="delay">
        <i class="fa-solid fa-hourglass-half"></i><span> Delay</span>
      </div>

    </div>
    <div class="col-right">
      <div id="drawflow" ondrop="drop(event)" ondragover="allowDrop(event)">

        <div class="btn-export" onclick="downloadNodes()">Export Nodes to file</div>
        <div class="btn-load" onclick="loadNodes()">Load Nodes from file</div>
        <div class="btn-save" onclick="saveConfig()">Save Config</div>
        <div class="btn-clear" onclick="editor.clearModuleSelected()">Clear</div>
        <div class="btn-lock">
          <i id="lock" class="fas fa-lock" onclick="editor.editor_mode='fixed'; changeMode('lock');"></i>
          <i id="unlock" class="fas fa-lock-open" onclick="editor.editor_mode='edit'; changeMode('unlock');"
            style="display:none;"></i>
        </div>
        <div class="bar-zoom">
          <i class="fas fa-search-minus" onclick="editor.zoom_out()"></i>
          <i class="fas fa-search" onclick="editor.zoom_reset()"></i>
          <i class="fas fa-search-plus" onclick="editor.zoom_in()"></i>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/editor.js"></script>
</body>

</html>
